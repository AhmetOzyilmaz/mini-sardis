# Docker profile — overrides application.properties when SPRING_PROFILES_ACTIVE=docker
# H2 stays in-memory; DataInitializer re-seeds on every startup (expected for demo)

# Tag all metrics with environment=docker so Grafana can filter by deployment
management.metrics.tags.environment=docker

# Kafka bootstrap (container name resolves inside the Docker network)
# Uncomment when spring-kafka is added to build.gradle:
# spring.kafka.bootstrap-servers=kafka:29092

# Reduce startup log noise in container output
logging.level.org.flywaydb=WARN
logging.level.org.springframework.security=WARN

# Disable H2 console in container (not needed — use Actuator for health)
spring.h2.console.enabled=false
